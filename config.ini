[custom]
target=clash

; --- 1. 策略组定义（极致纯净界面） ---
; 手动切换：仅显示手动地区和自动选择，不显示直连和拦截
group=手动切换`select`自动选择`日本自动`香港自动`新加坡自动`美国自动`.*

; 核心故障转移：按顺序死守日本，日本挂了跳香港，日本恢复自动跳回
; 1800秒（30分钟）检测一次，确保3台设备不爆10w额度
group=自动选择`fallback`日本自动`香港自动`新加坡自动`美国自动`.*`http://www.gstatic.com/generate_204`1800

; --- 2. 地区自动归类（后台静默测速，界面不显示） ---
; 内部自动选出该地区最快的 IP
group=日本自动`url-test`JP|日本|Japan`http://www.gstatic.com/generate_204`1800,,50
group=香港自动`url-test`HK|香港|Hong Kong`http://www.gstatic.com/generate_204`1800,,50
group=新加坡自动`url-test`SG|新加坡|Singapore`http://www.gstatic.com/generate_204`1800,,50
group=美国自动`url-test`US|美国|States`http://www.gstatic.com/generate_204`1800,,50

; 韩国和台湾只做归类供“手动切换”选择，不参与上面的“自动选择”故障转移
group=韩国自动`url-test`KR|韩国|Korea`http://www.gstatic.com/generate_204`1800,,50
group=台湾自动`url-test`TW|台湾|Taiwan`http://www.gstatic.com/generate_204`1800,,50

; --- 3. 规则关联（引用你 3376 行的 clash.ini） ---
; 你的 clash.ini 里的 DIRECT 和 REJECT 会隐身生效
ruleset=自动选择,https://raw.githubusercontent.com/aooner/Cloudflare/refs/heads/main/clash.ini

; 兜底规则：没匹配到的流量全部静默进入“自动选择”逻辑
ruleset=自动选择,[]FINAL

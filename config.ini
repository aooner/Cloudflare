[custom]
target=clash

; --- 只定义这两个组，界面就只会显示这两个 ---
group=手动切换`select`自动选择`香港自动`日本自动`台湾自动`韩国自动`新加坡自动`美国自动`.*
group=自动选择`fallback`日本自动`香港自动`台湾自动`韩国自动`新加坡自动`美国自动`.*`http://www.gstatic.com/generate_204`300

; --- 后台地区自动组（界面隐藏） ---
group=香港自动`url-test`HK|香港|Hong Kong`http://www.gstatic.com/generate_204`300,,50
group=日本自动`url-test`JP|日本|Japan`http://www.gstatic.com/generate_204`300,,50
group=台湾自动`url-test`TW|台湾|Taiwan`http://www.gstatic.com/generate_204`300,,50
group=韩国自动`url-test`KR|韩国|Korea`http://www.gstatic.com/generate_204`300,,50
group=新加坡自动`url-test`SG|新加坡|Singapore`http://www.gstatic.com/generate_204`300,,50
group=美国自动`url-test`US|美国|States`http://www.gstatic.com/generate_204`300,,50

; --- 关联你修改好的 clash.ini ---
ruleset=自动选择,https://raw.githubusercontent.com/aooner/Cloudflare/refs/heads/main/clash.ini
ruleset=自动选择,[]FINAL
